<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save to Tether</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 4 L12 20 M7 8 L12 4 L17 8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="12" cy="20" r="2" fill="white"/>
    </svg>
    <span class="logo-text">Tether</span>
    <button class="settings-btn" id="open-settings" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <div id="not-configured" class="state-msg" style="display:none">
    <p>Configure your Tether server URL and API key first.</p>
    <button class="btn-primary" id="go-settings">Open Settings</button>
  </div>

  <div id="main" style="display:none">
    <div class="url-row">
      <img id="favicon" class="favicon" src="" alt="" style="display:none">
      <span id="page-url" class="page-url"></span>
    </div>

    <div class="field">
      <label class="field-label">Tags</label>
      <div class="tag-input-wrap" id="tag-input-wrap">
        <div id="selected-tags" class="selected-tags"></div>
        <input
          type="text"
          id="tag-search"
          class="tag-search"
          placeholder="Add tags…"
          autocomplete="off"
          spellcheck="false"
        >
      </div>
      <div id="tag-dropdown" class="tag-dropdown" style="display:none"></div>
    </div>

    <button class="btn-primary save-btn" id="save-btn">Save link</button>

    <div id="status" class="status" style="display:none"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
